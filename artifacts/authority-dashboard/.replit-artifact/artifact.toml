kind = "web"
previewPath = "/"
title = "Urban Eye — Authority Dashboard"
version = "1.0.0"
id = "artifacts/authority-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21328

[services.development]
run = "pnpm --filter @workspace/authority-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/authority-dashboard", "run", "build" ]
publicDir = "artifacts/authority-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21328"
BASE_PATH = "/"
